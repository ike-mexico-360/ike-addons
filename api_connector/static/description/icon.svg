<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bgGradient)"/>
  
  <!-- Main API connector symbol -->
  <g transform="translate(16, 20)">
    <!-- Left server/system -->
    <rect x="8" y="20" width="20" height="28" rx="4" fill="url(#iconGradient)" opacity="0.9"/>
    <rect x="10" y="24" width="16" height="2" rx="1" fill="#4f46e5"/>
    <rect x="10" y="28" width="12" height="2" rx="1" fill="#4f46e5"/>
    <rect x="10" y="32" width="14" height="2" rx="1" fill="#4f46e5"/>
    
    <!-- Right server/system -->
    <rect x="68" y="20" width="20" height="28" rx="4" fill="url(#iconGradient)" opacity="0.9"/>
    <rect x="70" y="24" width="16" height="2" rx="1" fill="#4f46e5"/>
    <rect x="70" y="28" width="12" height="2" rx="1" fill="#4f46e5"/>
    <rect x="70" y="32" width="14" height="2" rx="1" fill="#4f46e5"/>
    
    <!-- Connection line -->
    <path d="M28 34 L68 34" stroke="url(#iconGradient)" stroke-width="3" stroke-linecap="round"/>
    
    <!-- API methods indicators -->
    <circle cx="38" cy="34" r="6" fill="url(#accentGradient)"/>
    <text x="38" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">API</text>
    
    <circle cx="58" cy="34" r="6" fill="url(#accentGradient)"/>
    <text x="58" y="38" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold">OUT</text>
    
    <!-- Data flow arrows -->
    <polygon points="32,32 36,34 32,36" fill="#10b981"/>
    <polygon points="60,32 64,34 60,36" fill="#10b981"/>
    
    <!-- HTTP method badges -->
    <rect x="12" y="54" width="18" height="8" rx="4" fill="#ef4444" opacity="0.8"/>
    <text x="21" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6" font-weight="bold">POST</text>
    
    <rect x="34" y="54" width="16" height="8" rx="4" fill="#3b82f6" opacity="0.8"/>
    <text x="42" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6" font-weight="bold">GET</text>
    
    <rect x="54" y="54" width="16" height="8" rx="4" fill="#f59e0b" opacity="0.8"/>
    <text x="62" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6" font-weight="bold">PUT</text>
    
    <rect x="74" y="54" width="18" height="8" rx="4" fill="#8b5cf6" opacity="0.8"/>
    <text x="83" y="60" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6" font-weight="bold">DEL</text>
  </g>
  
  <!-- Bottom status indicator -->
  <rect x="20" y="112" width="88" height="6" rx="3" fill="url(#accentGradient)" opacity="0.7"/>
  <circle cx="24" cy="115" r="2" fill="#ffffff"/>
  <circle cx="32" cy="115" r="2" fill="#ffffff"/>
  <circle cx="40" cy="115" r="2" fill="#ffffff"/>
</svg>
